<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Adarsh Anand</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { color-scheme: light dark; }
    body {
      min-height: 100svh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, sans-serif;
      background: #fff;
      color: #111;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0a0a0a; color: #f5f5f5; }
      .card { background: #111; border-color: #222; }
    }
    .card {
      text-align: center;
      padding: 3rem 2rem;
      border: 1px solid #e5e5e5;
      border-radius: 1.5rem;
      max-width: 28rem;
      width: 90%;
    }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem; letter-spacing: -0.03em; }
    p { font-size: 0.9rem; opacity: 0.6; line-height: 1.6; margin-bottom: 1.5rem; }
    button {
      background: #111;
      color: #fff;
      border: none;
      border-radius: 0.75rem;
      padding: 0.6rem 1.5rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
    }
    @media (prefers-color-scheme: dark) {
      button { background: #fff; color: #111; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>You're offline</h1>
    <p>This page isn't cached yet. Check your connection and try again.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
